name: Update Subscription

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  NUM_RUNNERS: 4
  THRESHOLD_MS: 100   # مقدار آستانه پینگ

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Raw Configs
        run: |
          > raw.txt
          urls=(
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/All_Configs_Sub.txt"
            "https://raw.githubusercontent.com/mohamadfg-dev/telegram-v2ray-configs-collector/refs/heads/main/category/vless.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
            "https://raw.githubusercontent.com/V2RayRoot/V2RayConfig/refs/heads/main/Config/vless.txt"
            "https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/filtered/subs/vless.txt"
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Splitted-By-Protocol/vless.txt"
            "https://raw.githubusercontent.com/F0rc3Run/F0rc3Run/main/splitted-by-protocol/vless.txt"
            "https://raw.githubusercontent.com/arshiacomplus/v2rayExtractor/refs/heads/main/vless.html"
            "https://raw.githubusercontent.com/SoliSpirit/v2ray-configs/refs/heads/main/Protocols/vless.txt"
            "https://raw.githubusercontent.com/hamedcode/port-based-v2ray-configs/main/sub/vless.txt"
            "https://raw.githubusercontent.com/10ium/ScrapeAndCategorize/refs/heads/main/output_configs/Vless.txt"
            "https://raw.githubusercontent.com/10ium/MihomoSaz/main/Sublist/arshiacomplus/v2rayExtractor_vless.yaml"
            "https://raw.githubusercontent.com/Mosifree/-FREE2CONFIG/refs/heads/main/Reality"
            "https://raw.githubusercontent.com/10ium/V2Hub3/refs/heads/main/Split/Normal/reality"
            "https://raw.githubusercontent.com/itsyebekhe/PSG/main/lite/subscriptions/meta/reality"
          )
          
          for url in "${urls[@]}"; do
            echo "📥 Downloading from: $url"
            curl -L -s --max-time 15 "$url" >> raw.txt || echo "⚠️ Failed to download from $url"
            echo "" >> raw.txt
          done
          echo "✅ Total raw lines fetched: $(wc -l < raw.txt)"

      - name: Normalize and Deduplicate (Smart Core-based)
        run: |
          grep -oiE "vless://[^\"' <]+" raw.txt | sed 's/\r//g' > extracted.txt
          sed -i 's/#.*//' extracted.txt
          awk -F'?' '{
            core = tolower($1);
            if (!seen[core]++) {
              print $0
            }
          }' extracted.txt > unique.txt
          echo "✅ Unique configs after strict core deduplication: $(wc -l < unique.txt)"

      - name: Split configs into chunks
        id: split
        run: |
          total_lines=$(wc -l < unique.txt)
          chunk_size=$(( ($total_lines + $NUM_RUNNERS - 1) / $NUM_RUNNERS ))
          echo "Chunk size: $chunk_size"
          matrix_json="{\"runner\":["
          for i in $(seq 1 $NUM_RUNNERS); do
            matrix_json+="\"$i\""
            [ $i -lt $NUM_RUNNERS ] && matrix_json+=","
          done
          matrix_json+="]}"
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT
          mkdir -p share
          cp unique.txt share/unique.txt

      - name: Upload unique.txt
        uses: actions/upload-artifact@v4
        with:
          name: shared-unique
          path: share/
          retention-days: 1

  test:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download unique.txt
        uses: actions/download-artifact@v4
        with:
          name: shared-unique
          path: ./

      - name: Get my chunk of configs
        run: |
          total_lines=$(wc -l < unique.txt)
          chunk_size=$(( ($total_lines + $NUM_RUNNERS - 1) / $NUM_RUNNERS ))
          start_line=$(( (${{ matrix.runner }} - 1) * $chunk_size + 1 ))
          end_line=$(( ${{ matrix.runner }} * $chunk_size ))
          sed -n "${start_line},${end_line}p" unique.txt > my_chunk.txt
          echo "🔹 Runner ${{ matrix.runner }} testing $(wc -l < my_chunk.txt) configs"

      - name: Install dependencies
        run: pip3 install requests --break-system-packages

      - name: Test and Filter Configs (TCP Ping with threshold)
        run: |
          python3 test_configs_final.py my_chunk.txt result_${{ matrix.runner }}.txt ${{ env.THRESHOLD_MS }}

      - name: Upload result chunk
        uses: actions/upload-artifact@v4
        with:
          name: result-chunk-${{ matrix.runner }}
          path: result_${{ matrix.runner }}.txt
          retention-days: 1

  merge:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download all result chunks
        uses: actions/download-artifact@v4
        with:
          pattern: result-chunk-*
          path: chunks/
          merge-multiple: true

      - name: Merge results (unique)
        run: |
          if ls chunks/result_*.txt 1> /dev/null 2>&1; then
            cat chunks/result_*.txt | sort -u > subscription.txt
            echo "✅ Total valid configs after merge: $(wc -l < subscription.txt)"
          else
            echo "⚠️ No result files found!"
            > subscription.txt
          fi

      - name: Upload merged subscription for final test
        uses: actions/upload-artifact@v4
        with:
          name: subscription-merged
          path: subscription.txt
          retention-days: 1

  final_test:
    needs: merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download merged subscription
        uses: actions/download-artifact@v4
        with:
          name: subscription-merged
          path: ./

      - name: Install dependencies
        run: pip3 install requests --break-system-packages

      - name: Final test and filter
        run: |
          python3 test_configs_final.py subscription.txt subscription_final.txt ${{ env.THRESHOLD_MS }}
          sort -u subscription_final.txt > subscription_final_unique.txt
          mv subscription_final_unique.txt subscription_final.txt
          echo "✅ Final valid configs after final test: $(wc -l < subscription_final.txt)"

      - name: Replace subscription with final version
        run: |
          if [ -f subscription_final.txt ]; then
            mv subscription_final.txt subscription.txt
            echo "✅ Final unique configs: $(wc -l < subscription.txt)"
          else
            echo "⚠️ Final test produced no results"
            > subscription.txt
          fi

      - name: Final uniqueness check
        run: |
          sort -u subscription.txt > subscription_unique.txt
          mv subscription_unique.txt subscription.txt
          echo "✅ Final unique configs after extra sort: $(wc -l < subscription.txt)"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add subscription.txt
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update subscription"
            git pull --rebase origin main
            git push origin main
          fi
